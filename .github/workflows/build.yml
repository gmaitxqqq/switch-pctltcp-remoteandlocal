name: Build Switch NSP

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkita64:latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build
        run: |
          make clean || true
          make

      - name: List build outputs
        run: |
          echo "=== Root dir ==="
          ls -la *.nsp *.nso *.npdm *.elf 2>/dev/null || echo "No build artifacts in root"
          echo "=== Build dir ==="
          ls -la build/ 2>/dev/null || echo "No build dir"

      - name: Prepare release artifact
        run: |
          TID="010000000000BD23"
          DIST="dist/atmosphere/contents/${TID}"
          FLAGS="dist/atmosphere/contents/${TID}/flags"

          mkdir -p "${DIST}" "${FLAGS}"

          if [ -f "pctltcp-sysmodule.nsp" ]; then
            cp "pctltcp-sysmodule.nsp" "${DIST}/exefs.nsp"
            echo "NSP: OK"
          else
            echo "ERROR: pctltcp-sysmodule.nsp not found!"
            ls -la *.nsp *.nso *.npdm *.elf 2>/dev/null || true
            exit 1
          fi

          if [ -f "toolbox.json" ]; then
            cp "toolbox.json" "${DIST}/toolbox.json"
            echo "toolbox.json: OK"
          fi

          touch "${FLAGS}/boot2.flag"

          echo "--- Release contents ---"
          find dist/ -type f

      - name: Package artifact
        run: |
          cd dist
          zip -r ../pctltcp-sysmodule.zip atmosphere/
          cd ..
          ls -la pctltcp-sysmodule.zip

      - name: Upload artifact (for branch pushes)
        if: startsWith(github.ref, 'refs/heads/')
        uses: actions/upload-artifact@v4
        with:
          name: pctltcp-sysmodule
          path: dist/

      - name: Create Release and Upload Asset (for tags)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: pctltcp-sysmodule.zip
          body: |
            Switch PCTL TCP Sysmodule ${{ github.ref_name }}

            ## 安装方法
            1. 解压 `pctltcp-sysmodule.zip`
            2. 将 `atmosphere` 文件夹复制到 SD 卡根目录
            3. 重启 Switch

            ## 变更日志
            见 README.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
